name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.24"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Check formatting
        run: test -z "$(gofmt -l ./internal/ ./cmd/)"

      - name: Vet
        run: go vet ./internal/... ./cmd/...

      - name: Test
        run: go test -v -coverprofile=coverage.out ./internal/... ./cmd/...

      - name: Build
        run: go build -o my-agent ./cmd/my-agent/

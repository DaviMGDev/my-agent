# https://golangci-lint.run/usage/configuration/
linters:
  enable:
    - errcheck
    - gosimple
    - staticcheck
    - govet
    - ineffassign
    - unused

linters-settings:
  staticcheck:
    checks: ["all"]

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 3m
  tests: true
